<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>tasks</title>
</head>
<body>
    <table border="1">
        <tr>
            <th>Tasks</th>
            <th>status</th>
            <th>action</th>
        </tr>
        
        {% for task in tasks%}
            <tr>
               <td>{{task[1]}}</td>
               <td>{{task[2]}}</td>
               <td>
                <a href="{{url_for('update', id=task[0])}}">UPDATE</a>
               </td>
               <td>
                <a href="{{url_for('delete_tasks', id=task[0])}}">DELETE</a>
               </td>
               
            </tr>   
        {% endfor%}
        <a href="{{url_for('add')}}">ADD TASK</a>
        
        
        
    </table>
</body>
</html>
