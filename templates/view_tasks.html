{%extends "base.html"%}
{%block content%}
    <table border="1">
        <tr>
            <th>Tasks</th>
            <th>status</th>
            <th>action</th>
        </tr>
        
        {% for task in tasks%}
            <tr>
               <td>{{task[1]}}</td>
               <td>{{task[2]}}
               </td>
               <td>
                <a href="{{url_for('update', id=task[0])}}">UPDATE</a>
               </td>
               <td>
                <form action="{{url_for('delete_tasks', id=task[0])}}" method='POST'>
                    <button type="submit">delete</button>
                </form>
                     
               </td>
               
            </tr>   
        {% endfor%}
    </table>
   


{%endblock%}
