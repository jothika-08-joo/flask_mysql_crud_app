{%extends "base.html"%}
{%block content%}
    <form action="/update_tasks/{{task[0]}}" method="POST">
        <input type="text" name="title" value="{{task[1]}}" placeholder="enter a update task">
        <input type="checkbox" name="completed" value="1" {% if task[2] == "completed" %}checked{% endif %}>completed
        <button type="submit">update</button>

    </form>
{%endblock%}
