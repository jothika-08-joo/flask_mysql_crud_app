<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>update_tasks</title>
</head>
<body>
    <form action="/update_tasks/{{task[0]}}" method="POST">
        <input type="text" name="title" value="{{task[1]}}" placeholder="enter a update task">
        <input type="number" name="completed" value="{{task[2]}}" placeholder="enter 0 or 1">
        <button type="submit">update</button>

    </form>
</body>
</html>
