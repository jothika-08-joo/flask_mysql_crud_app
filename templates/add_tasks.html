{% extends "base.html" %}

{% block content %}
<div class="card shadow">
    <div class="card-header bg-primary text-white">
        <h3 class="mb-0">Add New Task</h3>
    </div>
    <div class="card-body p-4">
        <form action="{{ url_for('add_tasks') }}" method="POST">
            <div class="mb-3">
                <label for="title" class="form-label">Task Title</label>
                <input type="text" class="form-control" id="title" name="title" placeholder="What needs to be done?" required>
            </div>
            <div class="mb-3 form-check">
                <input type="checkbox" class="form-check-input" id="completed" name="completed" value="1">
                <label class="form-check-label" for="completed">Mark as already completed</label>
            </div>
            <div class="d-flex justify-content-between">
                <a href="{{ url_for('get_tasks') }}" class="btn btn-outline-secondary">Cancel</a>
                <button type="submit" class="btn btn-primary">Save Task</button>
            </div>
        </form>
    </div>
</div>
{% endblock %}
