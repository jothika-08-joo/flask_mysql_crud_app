{%extends "base.html"%}
    {%block content%}
    <h2>add tasks</h2>
        <form action="{{url_for('add_tasks')}}" method="POST">
        <input type="text" name="title" placeholder="enter a task">
        <input type="checkbox" name="completed" value="1">completed
        <button type="submit">Add</button>
        </form>
    {% with messages = get_flashed_messages()%}
       {% if messages %}
           {% for message in messages %}
                 {{message}}
            {% endfor %}
        {%endif%}
    {%endwith%}
    {%endblock%}
