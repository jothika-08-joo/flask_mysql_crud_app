name: Build and Test Project
on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]  
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/Checkout@v3


      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Build Docker Image
        run: docker build -t my-todo-app .
